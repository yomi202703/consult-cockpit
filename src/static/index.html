<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>consult cockpit</title>
<style>
  :root{
    --bg:#ffffff; --ink:#0d0d0d; --dim:#8f8f8f; --edge:#e6e6e6;
    --bubble:#ececf6;            /* user bubble (ChatGPT Atlas lavender) */
    --accent:#7657d6;            /* send button / accents */
    --worker:#0a7d55; --reader:#1f6feb; --star:#c2680c;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;color:var(--ink);background:var(--bg);
       font:15px/1.7 -apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
       display:flex;flex-direction:column;height:100vh;overflow:hidden}
  code,pre{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

  header{display:flex;align-items:center;gap:10px;padding:10px 20px;flex:0 0 auto;
         border-bottom:1px solid var(--edge)}
  header b{font-size:15px;font-weight:700}
  header .sub{color:var(--dim);font-size:12px}
  header .lbl{color:var(--dim);font-size:12px;margin-left:auto}
  #repo{width:300px;border:1px solid var(--edge);border-radius:999px;padding:4px 14px;
        font:inherit;font-size:12px;background:#fff;color:#444}
  #repo:focus{outline:none;border-color:#c9c9c9}
  #status{color:var(--dim);font-size:12px;white-space:nowrap}
  #status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
               background:#c2c7cf;margin-right:5px;vertical-align:-1px}
  #status.ok .dot{background:#19c37d}
  #status.bad .dot{background:#ef4146}

  /* ---- conversation ---- */
  #chat{flex:1 1 auto;min-height:0;overflow-y:auto;padding:28px 20px 8px}
  #chat .inner{max-width:768px;margin:0 auto}

  .turn{margin:0 0 26px}
  .turn.user{display:flex;justify-content:flex-end}
  .turn.user pre{background:var(--bubble);border-radius:22px;padding:10px 18px;max-width:78%}
  .turn.assistant pre{padding:0}
  .turn pre{margin:0;white-space:pre-wrap;word-break:break-word;font:inherit}
  .sys{color:#b3453e;font-size:13px;margin:0 0 20px;padding-left:10px;border-left:2px solid #ef4146}

  /* ---- tool cards (fetch / consult) — ChatGPT の「検索しました ▸」の位置づけ ---- */
  .tool{margin:0 0 18px;border:1px solid var(--edge);border-radius:14px;background:#fafafa;
        overflow:hidden;font-size:13px}
  .tool summary{cursor:pointer;list-style:none;padding:9px 16px;color:var(--dim);user-select:none}
  .tool summary::-webkit-details-marker{display:none}
  .tool summary::before{content:'▸ ';color:#c0c0c0}
  .tool[open] summary::before{content:'▾ ';color:#c0c0c0}
  .tool summary:hover{color:var(--ink)}
  .tool .tbody{border-top:1px solid var(--edge);padding:10px 16px;max-height:340px;overflow-y:auto;background:#fff}
  .tool .act{color:var(--dim);font-size:12px;padding:2px 0}
  .tool .act code{color:var(--star);font-size:11px;word-break:break-all}
  /* reader turns inside an expanded consult card */
  .tool .rturn{margin:10px 0}
  .tool .rturn .rrole{font-size:10px;text-transform:uppercase;letter-spacing:.5px;
                      font-weight:700;margin-bottom:2px;color:var(--dim)}
  .tool .rturn.assistant .rrole{color:var(--reader)}
  .tool .rturn pre{margin:0;white-space:pre-wrap;word-break:break-word;font:inherit;font-size:12.5px}
  .tool .rturn details summary{cursor:pointer;color:var(--dim);list-style:none;padding:0}
  .tool .rturn details summary::before{content:'▸ '}
  .tool .rturn details[open] summary::before{content:'▾ '}

  /* direct-consult raw answer card */
  .rawans{margin:0 0 18px;border:1px solid var(--edge);border-radius:14px;background:#fff;overflow:hidden}
  .rawans .bar{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--edge);background:#fafafa}
  .rawans .bar .t{font-size:12px;font-weight:700;color:var(--reader)}
  .rawans .bar button{margin-left:auto;font:inherit;font-size:12px;padding:3px 14px;
                      border:1px solid var(--edge);color:var(--ink);background:#fff;
                      border-radius:999px;cursor:pointer}
  .rawans .bar button:hover:not(:disabled){background:#f2f2f2}
  .rawans .bar button:disabled{opacity:.5;cursor:default}
  .rawans pre{margin:0;padding:10px 16px;white-space:pre-wrap;word-break:break-word;
              font:inherit;font-size:14px;max-height:280px;overflow-y:auto}

  /* ---- status + composer ---- */
  .footwrap{flex:0 0 auto;padding:0 20px}
  .footinner{max-width:768px;margin:0 auto;padding:4px 0 10px}
  #pill{font-size:13px;color:var(--dim);min-height:22px;padding:0 6px 6px}
  #pill:empty{padding:0}
  #pill .spin{display:inline-block;width:10px;height:10px;border:2px solid #ddd;
              border-top-color:var(--accent);border-radius:50%;margin-right:7px;
              vertical-align:-1px;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .composer{border:1px solid var(--edge);border-radius:26px;background:#fff;
            box-shadow:0 2px 14px rgba(0,0,0,.05);padding:10px 12px 8px}
  .composer:focus-within{border-color:#d0d0d0}
  #w{display:block;width:100%;border:0;padding:2px 8px 8px;font:inherit;resize:none;
     background:transparent;max-height:160px}
  #w:focus{outline:none}
  .crow{display:flex;align-items:center;gap:8px}
  .chip{font:inherit;font-size:13px;color:#444;background:#fff;border:1px solid var(--edge);
        border-radius:999px;padding:5px 14px;cursor:pointer;white-space:nowrap}
  .chip:hover:not(:disabled){background:#f2f2f2}
  .chip:disabled{opacity:.45;cursor:default}
  .sendbtn{margin-left:auto;width:36px;height:36px;border-radius:50%;border:0;cursor:pointer;
           background:var(--accent);color:#fff;font-size:17px;line-height:1;
           display:flex;align-items:center;justify-content:center}
  .sendbtn:hover:not(:disabled){filter:brightness(1.08)}
  .sendbtn:disabled{background:#d9d9e3;cursor:default}
  .hint{color:#b4b4b4;font-size:11.5px;text-align:center;padding:8px 0 2px}
</style>
</head>
<body>

<header>
  <b>consult cockpit</b>
  <span class="sub" id="wlabel">worker</span>
  <span class="lbl">repo</span>
  <input id="repo" value="." spellcheck="false" title="worker / reader が読む対象 repo">
  <span id="status" class="bad"><span class="dot"></span>…</span>
</header>

<div id="chat"><div class="inner" id="feed"></div></div>

<div class="footwrap">
  <div class="footinner">
    <div id="pill"></div>
    <div class="composer">
      <textarea id="w" rows="1" placeholder="質問してみましょう — 必要なら worker が自分で repo を読みます"></textarea>
      <div class="crow">
        <button class="chip" id="askBtn" onclick="askReader()"
          title="入力を質問として強いモデルに repo を読ませて直接聞く">ChatGPT に聞く</button>
        <button class="sendbtn" id="sendBtn" onclick="wsend()" title="send (Enter)">↑</button>
      </div>
    </div>
    <div class="hint">repo 本文は worker の会話履歴に入りません — 読みは使い捨て context のみ（このツールの不変条件）</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const chatEl = $('chat'), feed = $('feed');
const atBottom = () => chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 60;
const scrollDown = () => { chatEl.scrollTop = chatEl.scrollHeight; };
function autogrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; }
$('w').addEventListener('input', e=>autogrow(e.target));

// reader's display name: "ChatGPT" for the scrape reader, the model name for an API reader
let readerName='ChatGPT';
function applyReaderName(){
  $('askBtn').textContent = readerName+' に聞く';
}

// ---- busy state ----
let workerBusy=false, consultBusy=false;
function paintButtons(){
  $('sendBtn').disabled = workerBusy;
  $('askBtn').disabled = consultBusy;
}
function pill(html){ const stick=atBottom(); $('pill').innerHTML = html||''; if(stick) scrollDown(); }
const spin = t => `<span class="spin"></span>${esc(t)}`;

// ---- conversation primitives ----
let wCur=null;                     // streaming assistant <pre>
function turn(role, text){
  const stick=atBottom();
  const d=document.createElement('div'); d.className='turn '+(role==='user'?'user':'assistant');
  const p=document.createElement('pre'); p.textContent=text||''; d.appendChild(p);
  feed.appendChild(d); if(stick) scrollDown(); return p;
}
function sysline(text){
  const stick=atBottom();
  const d=document.createElement('div'); d.className='sys'; d.textContent=text;
  feed.appendChild(d); if(stick) scrollDown();
}

// ---- tool cards ----
// fetch card: the worker read the repo itself (one card per tool round)
let fetchCard=null;                // {body} while a worker fetch round is in flight
function openFetchCard(summary){
  const stick=atBottom();
  const det=document.createElement('details'); det.className='tool fetch';
  det.innerHTML=`<summary>repo を読んだ</summary><div class="tbody"></div>`;
  feed.appendChild(det); if(stick) scrollDown();
  fetchCard={body:det.querySelector('.tbody')};
}
// consult card: the reader (ChatGPT) studies the repo — expandable live mirror
let consult=null;                  // {det,sum,body,mirror,direct,sig}
let consultOrigin='direct';        // set to 'worker' by a toolcall right before consult:start
function openConsultCard(){
  const stick=atBottom();
  const det=document.createElement('details'); det.className='tool consult';
  det.innerHTML=`<summary>${esc(readerName)} に質問中…</summary>
    <div class="tbody"><div class="acts"></div><div class="mir"></div></div>`;
  feed.appendChild(det); if(stick) scrollDown();
  consult={det, sum:det.querySelector('summary'), body:det.querySelector('.acts'),
           mirror:det.querySelector('.mir'), direct:consultOrigin==='direct', sig:''};
  consultOrigin='direct';
}
function consultAct(html){
  if(!consult) return;
  const d=document.createElement('div'); d.className='act'; d.innerHTML=html;
  consult.body.appendChild(d);
}
// reader turns inside the consult card (folded if long)
function rturnHTML(t){
  const role = t.role==='user' ? 'user' : 'assistant';
  const body = t.text||'';
  let inner;
  if(body.length>500){
    const first = esc(body.split('\n')[0].slice(0,90));
    inner = `<details><summary>${first}… (${body.length} chars)</summary><pre>${esc(body)}</pre></details>`;
  } else inner = `<pre>${esc(body)}</pre>`;
  return `<div class="rturn ${role}"><div class="rrole">${esc(t.role)}</div>${inner}</div>`;
}
function renderConsultMirror(turns){
  if(!consult) return;
  const sig=JSON.stringify(turns||[]); if(sig===consult.sig) return;
  consult.sig=sig;
  const open=new Set([...consult.mirror.querySelectorAll('details')]
                     .map((d,i)=>d.open?i:-1).filter(i=>i>=0));
  consult.mirror.innerHTML=(turns||[]).map(rturnHTML).join('');
  [...consult.mirror.querySelectorAll('details')].forEach((d,i)=>{ if(open.has(i)) d.open=true; });
  if(consult.det.open) consult.mirror.scrollIntoView({block:'nearest'});
}
// direct-consult raw answer card, with hand-to-worker action
function rawAnswerCard(text){
  const stick=atBottom();
  const d=document.createElement('div'); d.className='rawans';
  d.innerHTML=`<div class="bar"><span class="t">${esc(readerName)} の回答</span>
    <button onclick="forward(this)">⇥ worker に渡す</button></div>
    <pre>${esc(text)}</pre>`;
  feed.appendChild(d); if(stick) scrollDown();
}
function forward(btn){ btn.disabled=true; btn.textContent='渡した ✓'; post('/forward',{}); }

// ---- labels from live config ----
fetch('/state').then(r=>r.json()).then(s=>{
  if(s.default_repo) $('repo').value = s.default_repo;
  if(s.worker_model){ $('wlabel').textContent = s.worker_model; document.title = 'cockpit — '+s.worker_model; }
  if(s.reader_mode==='api') readerName = s.reader_model || 'API reader';
  if(s.reader_mode==='disabled') $('askBtn').style.display='none';
  applyReaderName();
}).catch(()=>{});
applyReaderName();

// ---- SSE ----
const ev = new EventSource('/events');
ev.onmessage = e => {
  let m; try{ m = JSON.parse(e.data); }catch(_){ return; }
  switch(m.event){
    case 'status': {
      const ok = m.reader==='connected'||m.reader==='api';
      $('status').className = ok?'ok':'bad';
      $('status').innerHTML = `<span class="dot"></span>${esc(readerName)}: ${esc(m.reader)}`+
                              (m.detail?` · ${esc((m.detail+'').slice(0,60))}`:'');
      break; }
    case 'mirror': renderConsultMirror(m.turns); break;   // only lands in an open consult card
    case 'consult':
      switch(m.status){
        case 'start': consultBusy=true; paintButtons(); openConsultCard(); break;
        case 'briefed': consultAct('repo の説明と質問を送った'); break;
        case 'waiting':
          if(consult) consult.sum.textContent = `${readerName} に質問中… ${m.secs}s`;
          pill(spin(`${readerName} に質問中… ${m.secs}s`)); break;
        case 'done':
          consultBusy=false; paintButtons();
          if(consult){ consult.sum.textContent=`${readerName} に質問した`; consult=null; }
          if(!workerBusy) pill('');
          break;
        case 'error':
          consultBusy=false; paintButtons();
          if(consult){ consult.sum.textContent=`${readerName} への質問が失敗`; consult=null; }
          sysline('consult error: '+(m.detail||''));
          if(!workerBusy) pill('');
          break;
      }
      break;
    case 'fetch':
      if(m.who==='worker'){
        if(fetchCard) fetchCard.body.insertAdjacentHTML('beforeend',
          `<div class="act">round ${m.round} · <code>${esc(m.names)}</code></div>`);
      } else {
        consultAct(`round ${m.round} · ${esc(readerName)} が読む: <code>${esc(m.names)}</code>`);
        if(consult) consult.sum.textContent = `${readerName} が repo を読んでいる… round ${m.round}`;
      }
      break;
    case 'served':
      if(m.who==='worker'){
        if(fetchCard) fetchCard.body.insertAdjacentHTML('beforeend',
          `<div class="act">→ ${m.bytes} bytes を一時 context に配膳</div>`);
      } else consultAct(`→ ${m.bytes} bytes 配膳`);
      break;
    case 'answer':
      // 'answer' fires before consult:done, so the card is still live here.
      // direct consult (ChatGPT に聞く): show the raw answer with a hand-off action.
      // worker-mediated consult: skip — the worker's synthesis streams next.
      if(consult && consult.direct) rawAnswerCard(m.text||'');
      break;
    case 'explore': break;   // programmatic /worker-explore — no UI surface
    case 'worker': onWorker(m); break;
  }
};

function onWorker(m){
  switch(m.status){
    case 'history': case 'msg':
      turn(m.role, m.content);
      if(m.status==='msg'){ workerBusy=false; pill(''); paintButtons(); } break;
    case 'start':
      turn(m.role||'user', m.content);
      workerBusy=true; pill(spin('考え中…')); paintButtons(); break;
    case 'forwarded':
      wCur=null; turn(m.role||'user', m.content);
      if(!workerBusy) pill('');
      paintButtons(); break;
    case 'toolcall':
      // collapse the streamed tool block into a card
      if(wCur){ const t=wCur.closest('.turn'); if(t) t.remove(); }
      wCur=null;
      if(m.kind==='fetch'){ openFetchCard(m.summary||''); pill(spin('repo を読み中…')); }
      else { consultOrigin='worker'; pill(spin(`${readerName} に質問中…`)); }
      break;
    case 'consulting': wCur=null; consultOrigin='worker'; pill(spin(`${readerName} に質問中…`)); break;
    case 'exploring': workerBusy=true; pill(spin(`repo を探索中… round ${m.round}`)); paintButtons(); break;
    case 'delta':
      if(!wCur){ wCur = turn('assistant',''); fetchCard=null; }
      wCur.textContent += m.content; if(atBottom()) scrollDown(); break;
    case 'done': wCur=null; fetchCard=null; workerBusy=false; pill(''); paintButtons(); break;
    case 'busy': pill('busy — 前の応答を待って'); break;
    case 'error': wCur=null; fetchCard=null; workerBusy=false; paintButtons();
      pill(''); sysline('worker error: '+(m.detail||'')); break;
  }
}

// ---- actions ----
async function post(path, body){
  const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body||{})});
  return r.json().catch(()=>({}));
}
function wsend(){
  const message = $('w').value.trim(); if(!message||workerBusy) return;
  post('/worker', {message, repo:$('repo').value.trim()}); $('w').value=''; autogrow($('w'));
}
function askReader(){
  const question = $('w').value.trim(); if(!question||consultBusy) return;
  consultOrigin='direct';
  turn('user', question+`  (→ ${readerName} に直接)`);
  post('/consult', {repo:$('repo').value.trim(), question}).then(r=>{
    if(r&&r.error){ consultBusy=false; paintButtons();
      sysline('consult error: '+r.error+(r.detail?' — '+r.detail:'')); }
  });
  $('w').value=''; autogrow($('w'));
}
$('w').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); wsend(); }
});
</script>
</body>
</html>
