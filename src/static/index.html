<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>consult cockpit — worker × reader</title>
<style>
  :root{
    --bg:#eef0f3; --panel:#ffffff; --edge:#e0e3e8; --ink:#1c2126;
    --dim:#6b7280; --star:#c2680c; --worker:#0a7d55; --reader:#1f6feb; --user:#7c3aed;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
       background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:8px 14px;flex:0 0 auto;
         border-bottom:1px solid var(--edge);background:var(--panel)}
  header b{font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--dim)}
  #status{margin-left:auto;font-size:12px;color:var(--dim)}
  #status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
               background:#c2c7cf;margin-right:5px;vertical-align:middle}
  #status.ok .dot{background:var(--worker)} #status.bad .dot{background:#d1453b}
  .grid{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 1fr 1fr}
  .lane{display:flex;flex-direction:column;min-width:0;min-height:0;
        border-right:1px solid var(--edge);background:var(--panel)}
  .lane:last-child{border-right:none}
  .lane h2{margin:0;padding:8px 12px;font-size:11px;font-weight:700;flex:0 0 auto;
           border-bottom:1px solid var(--edge);color:var(--dim);
           text-transform:uppercase;letter-spacing:.7px}
  .lane.reader h2{color:var(--reader)} .lane.star h2{color:var(--star)} .lane.worker h2{color:var(--worker)}
  .lane h2 small{float:right;color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0}
  .body{flex:1 1 auto;min-height:0;overflow-y:auto;padding:10px 12px}
  .turn{margin:0 0 14px}
  .turn .role{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:700}
  .turn.user .role{color:var(--user)}
  .turn.assistant .role{color:var(--reader)}
  .turn pre{margin:0;white-space:pre-wrap;word-break:break-word;font:inherit}
  .turn details summary{cursor:pointer;color:var(--dim);list-style:none}
  .turn details summary::before{content:'▸ ';color:var(--dim)}
  .turn details[open] summary::before{content:'▾ '}
  .turn details summary:hover{color:var(--ink)}
  /* middle lane = fetch traffic (the star) */
  .ev{padding:6px 9px;margin:0 0 6px;border-left:3px solid var(--edge);background:#f7f8fa;border-radius:0 4px 4px 0}
  .ev.fetch{border-left-color:var(--star);background:#fdf6ee}
  .ev.fetch.worker{border-left-color:var(--worker);background:#f0faf5}
  .ev.fetch.worker code{color:var(--worker)}
  .ev.served{border-left-color:#c2c7cf;color:var(--dim)}
  .ev.consult,.ev.explore{border-left-color:var(--reader);color:var(--dim)}
  .ev.explore{border-left-color:var(--worker)}
  .ev .rnd{color:var(--dim);font-size:11px}
  .ev .ts{float:right;color:#a9afba;font-size:10px}
  .ev .who{font-weight:700;font-size:10px;padding:0 5px;border-radius:3px;margin-right:5px}
  .ev .who.reader{color:var(--reader);background:#e8f0fe}
  .ev .who.worker{color:var(--worker);background:#e6f6ee}
  .ev code{color:var(--star);word-break:break-word;font-weight:600}
  /* the answer card: the artifact, not a count */
  .card{border:1px solid var(--worker);border-radius:6px;margin:0 0 8px;background:#f0faf5;overflow:hidden}
  .card .bar{display:flex;align-items:center;gap:8px;padding:6px 9px;border-bottom:1px dashed var(--edge)}
  .card .bar .t{font-weight:700;color:var(--worker);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .card .bar button{margin-left:auto;background:#fff;border:1px solid var(--star);color:var(--star);
    border-radius:5px;padding:2px 10px;cursor:pointer;font:inherit;font-weight:600}
  .card .bar button:hover{background:#fbf0e2}
  .card .bar button:disabled{opacity:.45;cursor:default}
  .card pre{margin:0;padding:8px 10px;white-space:pre-wrap;word-break:break-word;font:inherit;
            max-height:220px;overflow-y:auto}
  .foot{border-top:1px solid var(--edge);padding:8px;background:var(--panel);display:flex;gap:6px;flex:0 0 auto;align-items:flex-end}
  .foot.col{flex-direction:column;align-items:stretch}
  .btnrow{display:flex;gap:6px;justify-content:flex-end}
  .foot input,.foot textarea{flex:1;min-width:0;background:#fff;border:1px solid var(--edge);
    color:var(--ink);border-radius:6px;padding:7px 9px;font:inherit;resize:none}
  .foot input:focus,.foot textarea:focus{outline:none;border-color:var(--reader)}
  .foot button{background:#f3f4f6;border:1px solid var(--edge);color:var(--ink);
    border-radius:6px;padding:7px 13px;cursor:pointer;font:inherit;font-weight:600;white-space:nowrap}
  .foot button:hover{background:#e9ebee}
  .foot button:disabled{opacity:.45;cursor:default}
  .foot button.go{border-color:var(--worker);color:var(--worker)}
  .foot button.go:hover:not(:disabled){background:#e8f6ef}
  .repo-row{display:flex;gap:6px;padding:8px 8px 0;background:var(--panel);flex:0 0 auto}
  .repo-row input{flex:1;min-width:0;background:#fff;border:1px solid var(--edge);color:var(--ink);
    border-radius:6px;padding:5px 9px;font:12px/1.4 inherit}
  .repo-row .lbl{color:var(--dim);font-size:11px;align-self:center;flex:0 0 auto}
  .invariant{color:var(--dim);font-size:10px;padding:5px 12px;border-top:1px dashed var(--edge);flex:0 0 auto}
</style>
</head>
<body>
<header>
  <b>consult cockpit</b>
  <span class="sub">worker に話す — 「ChatGPTに聞いて」で reader が repo を読む</span>
  <span class="lbl" style="color:var(--dim);font-size:11px">repo</span>
  <input id="repo" value="." spellcheck="false" title="consult / explore の対象 repo"
         style="flex:1;min-width:120px;max-width:460px;background:#fff;border:1px solid var(--edge);border-radius:6px;padding:4px 9px;font:12px/1.4 inherit;color:var(--ink)">
  <span id="status" class="bad"><span class="dot"></span>reader: …</span>
</header>

<div class="grid">
  <!-- LEFT: reader mirror (observation only — the human talks to the worker) -->
  <section class="lane reader">
    <h2>reader <small id="rlabel">…</small></h2>
    <div class="body" id="mirror"></div>
  </section>

  <!-- MIDDLE: fetch traffic (star) -->
  <section class="lane star">
    <h2>fetch traffic <small>今どのファイルを読んでいるか</small></h2>
    <div class="body" id="traffic"></div>
    <div class="invariant">repo 本文はこのレーンと reader にしか出ない。worker の context には入らない。</div>
  </section>

  <!-- RIGHT: worker chat -->
  <section class="lane worker">
    <h2>worker <small id="wstate">idle</small></h2>
    <div class="body" id="worker"></div>
    <div class="foot col">
      <textarea id="w" rows="1" placeholder="worker に話す… (Enter=send / Shift+Enter=改行)"></textarea>
      <div class="btnrow">
        <button id="exploreBtn" onclick="explore()"
          title="↑の入力をタスクとして、左の repo を worker 自身がローカル探索する">explore repo ▶</button>
        <button class="go" id="sendBtn" onclick="wsend()">send</button>
      </div>
    </div>
  </section>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const ts = () => new Date().toTimeString().slice(0,8);
function atBottom(el){return el.scrollHeight - el.scrollTop - el.clientHeight < 40;}
function scroll(el){el.scrollTop = el.scrollHeight;}
function autogrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
$('w').addEventListener('input',e=>autogrow(e.target));

// ---- busy state drives the buttons (no dead 40s) ----
let workerBusy=false;
function paintButtons(){
  $('sendBtn').disabled=workerBusy; $('exploreBtn').disabled=workerBusy;
}

// ---- left: reader mirror. Long turns (the brief) collapse to a summary ----
let mirrorSig = '';
function turnHTML(t){
  const role=t.role==='user'?'user':'assistant';
  const body = t.text||'';
  let inner;
  if(body.length>500){
    const head=esc(body.split('\n')[0].slice(0,90));
    inner=`<details><summary>${head}… (${body.length} chars)</summary><pre>${esc(body)}</pre></details>`;
  }else{
    inner=`<pre>${esc(body)}</pre>`;
  }
  return `<div class="turn ${role}"><div class="role">${esc(t.role)}</div>${inner}</div>`;
}
function renderMirror(turns){
  const sig = JSON.stringify(turns||[]);
  if(sig === mirrorSig) return;            // no change → no repaint (kills カチカチ)
  mirrorSig = sig;
  const el = $('mirror'); const stick = atBottom(el);
  const open = new Set([...el.querySelectorAll('details[open]')].map((d,i)=>i)); // keep opened ones
  el.innerHTML = (turns||[]).map(turnHTML).join('');
  [...el.querySelectorAll('details')].forEach((d,i)=>{ if(open.has(i)) d.open=true; });
  if(stick) scroll(el);
}

// ---- middle: fetch traffic ----
function traffic(html, cls){
  const el = $('traffic'); const stick = atBottom(el);
  const d = document.createElement('div'); d.className = 'ev '+cls;
  d.innerHTML = `<span class="ts">${ts()}</span>`+html;
  el.appendChild(d); if(stick) scroll(el);
}
// the answer itself lands here as a card, forward inline (no hunt in the mirror)
function answerCard(text, note){
  const el = $('traffic'); const stick = atBottom(el);
  const d = document.createElement('div'); d.className='card';
  d.innerHTML = `<div class="bar"><span class="t">answer${note?' · '+esc(note):''}</span>`+
    `<button onclick="forward(this)">forward ⇥ worker</button></div>`+
    `<pre>${esc(text)}</pre>`;
  el.appendChild(d); if(stick) scroll(el);
}

// ---- right: worker chat ----
let wCur = null;
function wTurn(role, text){
  const el = $('worker');
  const d = document.createElement('div'); d.className = 'turn '+(role==='user'?'user':'assistant');
  d.innerHTML = `<div class="role">${esc(role)}</div><pre>${esc(text||'')}</pre>`;
  el.appendChild(d); scroll(el); return d.querySelector('pre');
}

// lane labels from live config
fetch('/state').then(r=>r.json()).then(s=>{
  if(s.default_repo) $('repo').value = s.default_repo;
  const w = $('worker').closest('.lane').querySelector('h2');
  if(s.worker_model) w.childNodes[0].textContent = 'worker — '+s.worker_model+' ';
  $('rlabel').textContent = s.reader_mode==='disabled' ? 'disabled'
    : s.reader_mode==='api' ? (s.reader_model||'API')+' (API)'
    : 'ChatGPT (web) 本物タブのミラー';
  if(s.worker_model) document.title = `consult cockpit — ${s.worker_model} × reader`;
  if(s.last_answer) answerCard(s.last_answer, '前回');   // reload keeps the forward path
}).catch(()=>{});

// ---- SSE ----
const ev = new EventSource('/events');
ev.onmessage = e => {
  let m; try{ m = JSON.parse(e.data); }catch(_){ return; }
  switch(m.event){
    case 'status': {
      const s = $('status'); const ok = m.reader==='connected'||m.reader==='api';
      s.className = ok?'ok':'bad';
      s.innerHTML = `<span class="dot"></span>reader: ${esc(m.reader)}`+(m.detail?` — ${esc(m.detail).slice(0,60)}`:'');
      break; }
    case 'mirror': renderMirror(m.turns); break;
    case 'consult':
      traffic(`<span class="rnd">consult</span> ${esc(m.status)}${m.repo?' · '+esc(m.repo):''}${m.detail?' · '+esc(m.detail):''}`, 'consult');
      break;
    case 'explore':
      traffic(`<span class="rnd">worker explore</span> ${esc(m.status)}${m.repo?' · '+esc(m.repo):''}`, 'explore');
      break;
    case 'fetch': {
      const who = m.who||'reader';
      if(who==='reader' && workerBusy){ $('wstate').textContent = `reader reading… round ${m.round}`; }
      traffic(`<span class="who ${who}">${who}</span><span class="rnd">round ${m.round} · fetch</span><br><code>${esc(m.names)}</code>`, 'fetch '+who);
      break; }
    case 'served': {
      const who = m.who||'reader';
      const dest = who==='worker' ? 'worker(一時context)' : 'reader';
      traffic(`<span class="who ${who}">${who}</span><span class="rnd">round ${m.round}</span> 配膳 ${m.bytes} bytes → ${dest}`, 'served');
      break; }
    case 'answer': answerCard(m.text||'', m.note); break;
    case 'worker': onWorker(m); break;
  }
};

function onWorker(m){
  switch(m.status){
    case 'history': case 'msg': wTurn(m.role, m.content);
      if(m.status==='msg'){ workerBusy=false; $('wstate').textContent='idle'; paintButtons(); } break;
    case 'start':
      wTurn(m.role||'user', m.content);
      workerBusy=true; $('wstate').textContent='thinking…'; paintButtons(); break;
    case 'forwarded':
      wCur=null; wTurn(m.role||'user', m.content);
      if(!workerBusy) $('wstate').textContent='idle';
      paintButtons(); break;
    case 'consulting':
      wCur=null; $('wstate').textContent='consulting reader…'; break;
    case 'exploring': workerBusy=true; $('wstate').textContent = `exploring… round ${m.round}`; paintButtons(); break;
    case 'delta':
      if(!wCur) wCur = wTurn('assistant','');
      wCur.textContent += m.content; scroll($('worker')); break;
    case 'done': wCur=null; workerBusy=false; $('wstate').textContent='idle'; paintButtons(); break;
    case 'busy': $('wstate').textContent = 'busy — 前の応答を待って'; break;
    case 'error': wCur=null; workerBusy=false; paintButtons();
      $('wstate').textContent = 'error'; traffic('worker error: '+esc(m.detail),'served'); break;
  }
}

// ---- actions ----
async function post(path, body){
  const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body||{})});
  return r.json().catch(()=>({}));
}
function wsend(){
  const message = $('w').value.trim(); if(!message||workerBusy) return;
  post('/worker', {message, repo:$('repo').value.trim()}); $('w').value=''; autogrow($('w'));
}
function explore(){
  const task = $('w').value.trim(); if(!task||workerBusy) return;
  post('/worker-explore', {repo:$('repo').value.trim(), task}); $('w').value=''; autogrow($('w'));
}
function forward(btn){ if(btn){btn.disabled=true; btn.textContent='forwarded ✓';} post('/forward', {}); }

// keyboard: Enter fires, Shift+Enter = newline
$('w').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();wsend();} });
</script>
</body>
</html>
